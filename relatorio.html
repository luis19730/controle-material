<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RelatÃ³rio - Bda Inf Amv</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="data.js?v=5"></script>
    <style>
        :root {
            --primary: #556b2f; --primary-dark: #3d4f1f; --primary-light: #6b8e23;
            --accent: #8b7355; --accent-light: #a0926e;
            --danger: #c0392b; --danger-dark: #a93226;
            --warning: #d4a017; --success: #556b2f;
            --bg: #f5f5f0; --surface: #ffffff; --surface-hover: #fafaf7;
            --text: #2c3e1a; --text-secondary: #5a6b4a; --text-muted: #8a9a7a;
            --border: #d4d9c8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
            --shadow: 0 4px 8px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.15), 0 4px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 25px 40px rgba(0,0,0,0.18), 0 10px 15px rgba(0,0,0,0.08);
            --radius: 12px; --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Mono', 'Courier New', monospace; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; font-size: 0.92rem; }

        .screen-only { max-width: 1200px; margin: 0 auto; padding: clamp(15px, 3vw, 30px) clamp(10px, 2vw, 20px); }
        .screen-header { text-align: center; margin-bottom: clamp(15px, 3vw, 30px); }
        .screen-header h1 { font-size: clamp(1.3em, 3.5vw, 2em); color: var(--text); margin-bottom: 10px; font-weight: 700; }
        .screen-header p { color: var(--text-secondary); margin-bottom: 20px; font-size: clamp(0.8em, 1.5vw, 1em); }
        .btn { padding: clamp(8px, 1.5vw, 12px) clamp(16px, 2.5vw, 30px); border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; font-size: clamp(0.8em, 1.5vw, 0.92rem); transition: var(--transition); font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn:active { transform: scale(0.97); }
        .btn-print { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: var(--shadow-sm), 0 3px 10px rgba(85,107,47,0.3); }
        .btn-back { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); text-decoration: none; display: inline-flex; }
        .btn-back:hover { background: var(--surface-hover); border-color: var(--text-muted); }
        .nav-links { display: flex; gap: clamp(6px, 1vw, 15px); justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }

        .om-shortcuts { display: flex; gap: clamp(4px, 0.8vw, 8px); flex-wrap: wrap; justify-content: center; margin: 20px 0 30px; }
        .om-shortcut { padding: clamp(5px, 0.8vw, 8px) clamp(8px, 1.2vw, 14px); border: 2px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text-secondary); font-size: clamp(0.55em, 1vw, 0.72em); font-weight: 700; cursor: pointer; text-decoration: none; transition: var(--transition); }
        .om-shortcut:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .report { background: var(--surface); max-width: 900px; margin: 0 auto; padding: clamp(20px, 4vw, 50px) clamp(15px, 3vw, 40px); box-shadow: var(--shadow-md); border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .report-header { text-align: center; border-bottom: 3px double var(--text); padding-bottom: 20px; margin-bottom: 30px; }
        .report-header img { max-width: clamp(40px, 8vw, 80px); margin-bottom: 10px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
        .report-header h2 { font-size: clamp(1em, 2.2vw, 1.4em); margin-bottom: 5px; color: var(--text); font-weight: 700; }
        .report-header h3 { font-size: clamp(0.85em, 1.6vw, 1.1em); font-weight: normal; color: var(--text-secondary); margin-bottom: 5px; }
        .report-header .date { color: var(--text-muted); font-size: clamp(0.75em, 1.3vw, 0.9em); }

        .kpi-report { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: clamp(8px, 1.5vw, 20px); margin: 30px 0; }
        .kpi-item { border: 1px solid var(--border); border-radius: var(--radius); padding: clamp(10px, 1.8vw, 20px); text-align: center; background: var(--surface); transition: var(--transition); position: relative; overflow: hidden; }
        .kpi-item::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); border-radius: 4px 0 0 4px; }
        .kpi-item:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .kpi-item.full { grid-column: 1 / -1; }
        .kpi-number { font-size: clamp(1.4em, 3.5vw, 2.5em); font-weight: 700; color: var(--primary); margin-bottom: 5px; line-height: 1.1; }
        .kpi-label { font-size: clamp(0.6em, 1.1vw, 0.85em); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }

        .om-section { margin-top: 40px; border-top: 2px solid var(--text); padding-top: 20px; page-break-inside: avoid; }
        .om-title { font-size: clamp(0.85em, 1.7vw, 1.15em); background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: clamp(7px, 1.2vw, 12px) clamp(10px, 1.5vw, 18px); border-radius: 8px; margin-bottom: 15px; font-weight: 700; letter-spacing: 0.2px; }
        .om-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: clamp(5px, 0.8vw, 10px); margin-bottom: 15px; }
        .om-kpi { background: var(--bg); border-radius: 8px; padding: clamp(6px, 1vw, 12px); text-align: center; border: 1px solid var(--border); }
        .om-kpi-value { font-size: clamp(0.9em, 2vw, 1.5em); font-weight: 700; }
        .om-kpi-label { font-size: clamp(0.48em, 0.85vw, 0.68em); color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.3px; }
        .om-kpi.green .om-kpi-value { color: var(--success); }
        .om-kpi.yellow .om-kpi-value { color: var(--warning); }
        .om-kpi.red .om-kpi-value { color: var(--danger); }

        .om-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 15px 0; border-radius: 8px; border: 1px solid var(--border); }
        .om-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .om-table th { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: clamp(4px, 0.7vw, 8px) clamp(5px, 0.8vw, 10px); text-align: left; font-size: clamp(0.52em, 0.9vw, 0.78em); text-transform: uppercase; font-weight: 700; letter-spacing: 0.2px; }
        .om-table td { padding: clamp(3px, 0.6vw, 7px) clamp(5px, 0.8vw, 10px); border-bottom: 1px solid var(--border); font-size: clamp(0.58em, 1vw, 0.82em); font-weight: 500; }
        .om-table tr:hover { background: var(--surface-hover); }
        .status-homologada { color: var(--success); font-weight: 700; }
        .status-pendente { color: var(--warning); font-weight: 700; }
        .status-recolhido { color: var(--danger); font-weight: 700; }

        .report-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); font-size: 0.8em; font-weight: 600; }

        @media print {
            body { background: white; }
            .screen-only { display: none !important; }
            .om-shortcuts { display: none !important; }
            .report { box-shadow: none; padding: 30px 20px; max-width: 100%; border: none; border-radius: 0; }
            .om-table-wrap { overflow: visible; border: none; }
            .om-table { min-width: unset; }
            .om-table th { background: var(--primary) !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="screen-only">
        <div class="screen-header">
            <h1>RelatÃ³rio por OM</h1>
            <p>Controle de Material - Bda Inf Amv</p>
            <div class="nav-links">
                <a href="index.html" class="btn btn-back">Consulta</a>
                <a href="painel.html" class="btn btn-back">Painel</a>
                <a href="relatorio.html" class="btn btn-back">RelatÃ³rio</a>
                <a href="imprimir.html" class="btn btn-back">ImpressÃ£o por OM</a>
                <button class="btn btn-print" onclick="window.print()">Gerar PDF / Imprimir</button>
            </div>
        </div>
    </div>

    <div class="report" id="report">
        <div class="report-header">
            <img src="logo.png" alt="Logo">
            <h2>RELATÃ“RIO POR ORGANIZAÃ‡ÃƒO MILITAR</h2>
            <h3>Controle de Material - Bda Inf Amv</h3>
            <div class="date" id="reportDate"></div>
        </div>

        <div class="kpi-report" id="kpiReport"></div>

        <div class="om-shortcuts" id="omShortcuts"></div>

        <div id="omSections"></div>

        <div class="report-footer">
            Sistema de Controle de Material Militar | Bda Inf Amv
        </div>
    </div>

    <script>
        async function renderAll(data) {
            const activeData = data.filter(d => d.finalizado !== true);
            const finalizedData = data.filter(d => d.finalizado === true);
            const total = activeData.length;
            const oms = [...new Set(activeData.map(d => d.om))];
            const homologadas = activeData.filter(d => d.status === 'homologada').length;
            const pendentes = activeData.filter(d => d.status === 'pendente').length;
            const qntRecolher = activeData.reduce((s, d) => s + (typeof d.qntRecolher === 'number' ? d.qntRecolher : 0), 0);
            const finalizados = finalizedData.length;

            document.getElementById('kpiReport').innerHTML = `
                <div class="kpi-item"><div class="kpi-number">${total}</div><div class="kpi-label">Total de Itens</div></div>
                <div class="kpi-item"><div class="kpi-number">${oms.length}</div><div class="kpi-label">OMs Envolvidas</div></div>
                <div class="kpi-item"><div class="kpi-number">${homologadas}</div><div class="kpi-label">DCGs Homologadas</div></div>
                <div class="kpi-item"><div class="kpi-number">${pendentes}</div><div class="kpi-label">Processos Pendentes</div></div>
                <div class="kpi-item"><div class="kpi-number" style="color:var(--accent);">${finalizados}</div><div class="kpi-label">Processos Finalizados</div></div>
                <div class="kpi-item full"><div class="kpi-number">${qntRecolher}</div><div class="kpi-label">QNT Total a Recolher</div></div>
            `;

            const sortedOms = oms.sort((a, b) => _getOmOrder(a) - _getOmOrder(b));

            document.getElementById('omShortcuts').innerHTML = sortedOms.map(om => {
                const id = om.replace(/[^a-zA-Z0-9]/g, '_');
                return `<a class="om-shortcut" href="#om_${id}">${om}</a>`;
            }).join('') + `<a class="om-shortcut" href="#finalizados_section" style="background:var(--accent);color:white;border-color:var(--accent);">Processos Finalizados (${finalizados})</a>`;

            let sectionsHtml = '';
            sortedOms.forEach(om => {
                const items = activeData.filter(d => d.om === om);
                const id = om.replace(/[^a-zA-Z0-9]/g, '_');
                const hom = items.filter(d => d.status === 'homologada').length;
                const pend = items.filter(d => d.status === 'pendente').length;
                const qr = items.reduce((s, d) => s + (typeof d.qntRecolher === 'number' ? d.qntRecolher : 0), 0);
                const totalItens = items.length;

                sectionsHtml += `
                    <div class="om-section" id="om_${id}">
                        <div class="om-title">${om}</div>
                        <div class="om-kpis">
                            <div class="om-kpi"><div class="om-kpi-value">${totalItens}</div><div class="om-kpi-label">Itens</div></div>
                            <div class="om-kpi green"><div class="om-kpi-value">${hom}</div><div class="om-kpi-label">DCGs Homologadas</div></div>
                            <div class="om-kpi yellow"><div class="om-kpi-value">${pend}</div><div class="om-kpi-label">Processos Pendentes</div></div>
                            <div class="om-kpi red"><div class="om-kpi-value">${qr}</div><div class="om-kpi-label">QNT a Recolher</div></div>
                        </div>
                        <div class="om-table-wrap">
                            <table class="om-table">
                                <thead><tr><th>Classe</th><th>Material</th><th>QNT na OM</th><th>QNT a Recolher</th><th>Status</th></tr></thead>
                                <tbody>
                                    ${items.map(d => {
                                        const statusLabel = d.status === 'homologada' ? 'DCG Homologada' : d.status === 'pendente' ? 'Processo Pendente' : 'Material Recolhido';
                                        const statusClass = 'status-' + d.status;
                                        return `<tr><td>${d.classe}</td><td>${d.material}</td><td>${d.qntOm}</td><td>${d.qntRecolher}</td><td class="${statusClass}">${statusLabel}</td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });

            document.getElementById('omSections').innerHTML = sectionsHtml;

            const finalHtml = `
                <div class="om-section" id="finalizados_section">
                    <div class="om-title" style="background:linear-gradient(135deg, var(--accent), var(--accent-light));">Consolidacao dos Processos Finalizados (${finalizados})</div>
                    <div class="om-kpis">
                        <div class="om-kpi"><div class="om-kpi-value">${finalizados}</div><div class="om-kpi-label">Total Finalizados</div></div>
                        <div class="om-kpi"><div class="om-kpi-value">${finalizedData.reduce((s, d) => s + (typeof d.qntOm !== 'number' ? 0 : d.qntOm), 0)}</div><div class="om-kpi-label">QNT Total na OM</div></div>
                    </div>
                    <div class="om-table-wrap">
                        <table class="om-table">
                            <thead><tr><th>OM</th><th>Classe</th><th>Material</th><th>QNT na OM</th><th>Processo Finalizado</th></tr></thead>
                            <tbody>
                                ${finalizedData.length > 0 ? finalizedData.map(d => `<tr><td>${d.om}</td><td>${d.classe}</td><td>${d.material}</td><td>${d.qntOm}</td><td>Finalizado</td></tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px;">Nenhum processo finalizado</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById('omSections').insertAdjacentHTML('beforeend', finalHtml);

            document.getElementById('reportDate').textContent = formatDate();
        }

        (async function init() {
            const data = await loadData();
            renderAll(data);
        })();
    </script>
</body>
</html>
