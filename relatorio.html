<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório - Bda Inf Amv</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial Black', Arial, sans-serif; background: #f5f5f5; color: #1a1a2e; min-height: 100vh; }
        .screen-only { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .screen-header { text-align: center; margin-bottom: 30px; }
        .screen-header h1 { font-size: 2em; color: #1a1a2e; margin-bottom: 10px; }
        .screen-header p { color: #666; margin-bottom: 20px; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .btn-print { background: linear-gradient(90deg, #6ba3be, #7bc8a4); color: #1a1a2e; }
        .btn-back { background: rgba(255,255,255,0.1); color: #1a1a2e; text-decoration: none; display: inline-block; }
        .nav-links { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }

        .om-shortcuts { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 20px 0 30px; }
        .om-shortcut { padding: 8px 14px; border: 2px solid #1a1a2e; border-radius: 6px; background: #fff; color: #1a1a2e; font-size: 0.75em; font-weight: bold; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .om-shortcut:hover { background: #1a1a2e; color: #fff; }

        .report { background: #fff; max-width: 900px; margin: 0 auto; padding: 50px 40px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        .report-header { text-align: center; border-bottom: 3px double #1a1a2e; padding-bottom: 20px; margin-bottom: 30px; }
        .report-header img { max-width: 80px; margin-bottom: 10px; }
        .report-header h2 { font-size: 1.4em; margin-bottom: 5px; }
        .report-header h3 { font-size: 1.1em; font-weight: normal; color: #444; margin-bottom: 5px; }
        .report-header .date { color: #666; font-size: 0.9em; }

        .kpi-report { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .kpi-item { border: 1px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; }
        .kpi-item.full { grid-column: 1 / -1; }
        .kpi-number { font-size: 2.5em; font-weight: bold; color: #1a1a2e; margin-bottom: 5px; }
        .kpi-label { font-size: 0.9em; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        .om-section { margin-top: 40px; border-top: 2px solid #1a1a2e; padding-top: 20px; page-break-inside: avoid; }
        .om-title { font-size: 1.2em; background: #1a1a2e; color: #fff; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; }
        .om-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .om-kpi { background: #f5f5f5; border-radius: 6px; padding: 12px; text-align: center; }
        .om-kpi-value { font-size: 1.5em; font-weight: bold; }
        .om-kpi-label { font-size: 0.7em; color: #666; text-transform: uppercase; }
        .om-kpi.green .om-kpi-value { color: #2d7a4f; }
        .om-kpi.yellow .om-kpi-value { color: #b8960a; }
        .om-kpi.red .om-kpi-value { color: #a04040; }

        .om-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85em; }
        .om-table th { background: #e8e8e8; padding: 8px 10px; text-align: left; font-size: 0.8em; text-transform: uppercase; border-bottom: 2px solid #1a1a2e; }
        .om-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }
        .om-table tr:hover { background: #f9f9f9; }
        .status-homologada { color: #2d7a4f; font-weight: bold; }
        .status-pendente { color: #b8960a; font-weight: bold; }
        .status-recolhido { color: #a04040; font-weight: bold; }

        .report-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; color: #888; font-size: 0.8em; }

        @media (max-width: 768px) {
            .screen-header h1 { font-size: 1.5em; }
            .nav-links { gap: 8px; }
            .btn { padding: 8px 16px; font-size: 0.85em; }
            .report { padding: 20px 15px; }
            .report-header h2 { font-size: 1.1em; }
            .report-header h3 { font-size: 0.9em; }
            .kpi-report { grid-template-columns: 1fr 1fr; gap: 10px; }
            .kpi-item { padding: 12px; }
            .kpi-number { font-size: 1.8em; }
            .kpi-label { font-size: 0.75em; }
            .om-shortcuts { gap: 5px; }
            .om-shortcut { padding: 6px 10px; font-size: 0.7em; }
            .om-title { font-size: 1em; padding: 8px 12px; }
            .om-kpis { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .om-kpi { padding: 10px; }
            .om-kpi-value { font-size: 1.3em; }
            .om-kpi-label { font-size: 0.65em; }
            .om-table { font-size: 0.8em; }
            .om-table th { padding: 6px 8px; font-size: 0.7em; }
            .om-table td { padding: 5px 8px; }
        }

        @media print {
            body { background: #fff; }
            .screen-only { display: none !important; }
            .om-shortcuts { display: none !important; }
            .report { box-shadow: none; padding: 30px 20px; max-width: 100%; }
            .kpi-item { border: 1px solid #999; }
            .om-section { page-break-inside: avoid; }
            @page { margin: 15mm; size: A4; }
        }
    </style>
</head>

        });

                    <div class="om-kpis">

            `;
